<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgMask" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable safe area -->
  <rect width="512" height="512" fill="url(#bgMask)"/>
  <!-- Clock face (smaller for safe area ~80%) -->
  <circle cx="256" cy="256" r="108" stroke="white" stroke-width="10" fill="none" opacity="0.95"/>
  <!-- Hour marks -->
  <line x1="256" y1="154" x2="256" y2="166" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="346" x2="256" y2="358" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="358" y1="256" x2="346" y2="256" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="154" y1="256" x2="166" y2="256" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="220" y2="200" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="256" x2="300" y2="206" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="8" fill="white"/>
</svg>
